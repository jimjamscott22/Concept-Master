  <text x="704" y="374" text-anchor="middle" fill="#E6EDF3" font-family="IBM Plex Sans, sans-serif" font-size="18">unrelated duties mixed</text>
  <text x="480" y="456" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="20">A cohesive class is easy to name because its parts support the same job</text>
