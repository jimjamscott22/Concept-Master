<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">Latency vs Throughput</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">One measures how long a single request takes; the other measures total work over time</text>
  <rect x="104" y="190" width="328" height="188" rx="18" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="268" y="240" text-anchor="middle" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700">Latency</text>
  <path d="M166 304H370" stroke="#58A6FF" stroke-width="5" stroke-linecap="round"/>
  <path d="M354 288L370 304L354 320" stroke="#58A6FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="268" y="346" text-anchor="middle" fill="#E6EDF3" font-family="IBM Plex Sans, sans-serif" font-size="18">time for one request</text>
  <rect x="528" y="190" width="328" height="188" rx="18" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="692" y="240" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700">Throughput</text>
  <path d="M584 286H792M584 314H792M584 342H792" stroke="#39D353" stroke-width="4" stroke-linecap="round"/>
  <text x="692" y="372" text-anchor="middle" fill="#E6EDF3" font-family="IBM Plex Sans, sans-serif" font-size="18">requests per second</text>
  <text x="480" y="444" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="20">A system can process many requests while still making each request wait</text>
</svg>
