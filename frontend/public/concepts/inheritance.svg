  <text x="402" y="222" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">speak()</text>

  <rect x="176" y="316" width="212" height="118" rx="18" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="204" y="354" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700">Cat</text>
