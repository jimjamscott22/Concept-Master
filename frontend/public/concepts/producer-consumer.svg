<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">Producer-Consumer</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="16">Bounded buffer decouples producers and consumers; two condition variables handle full/empty</text>

  <rect x="80" y="200" width="180" height="80" rx="14" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="170" y="232" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">Producer 1</text>
  <text x="170" y="258" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="13">push(item)</text>

  <rect x="80" y="300" width="180" height="80" rx="14" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="170" y="332" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">Producer 2</text>
  <text x="170" y="358" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="13">push(item)</text>

  <path d="M260 240 Q 320 260 360 280" stroke="#39D353" stroke-width="3"/>
  <polygon points="354,286 366,282 358,270" fill="#39D353"/>
  <path d="M260 340 Q 320 320 360 300" stroke="#39D353" stroke-width="3"/>
  <polygon points="358,310 366,298 354,294" fill="#39D353"/>

  <rect x="360" y="240" width="240" height="100" rx="14" fill="#0D1117" stroke="#D29922" stroke-width="3"/>
  <text x="480" y="234" text-anchor="middle" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700">bounded buffer (cap 4)</text>
  <rect x="378" y="262" width="48" height="56" rx="8" fill="#161B22" stroke="#D29922" stroke-width="2"/>
  <text x="402" y="296" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">A</text>
  <rect x="434" y="262" width="48" height="56" rx="8" fill="#161B22" stroke="#D29922" stroke-width="2"/>
  <text x="458" y="296" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">B</text>
  <rect x="490" y="262" width="48" height="56" rx="8" fill="#161B22" stroke="#D29922" stroke-width="2"/>
  <text x="514" y="296" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">C</text>
  <rect x="546" y="262" width="48" height="56" rx="8" fill="#161B22" stroke="#30363D" stroke-width="2" stroke-dasharray="4 4"/>

  <path d="M600 280 Q 660 260 700 240" stroke="#58A6FF" stroke-width="3"/>
  <polygon points="700,250 712,242 706,232" fill="#58A6FF"/>
  <path d="M600 300 Q 660 320 700 340" stroke="#58A6FF" stroke-width="3"/>
  <polygon points="706,348 712,338 700,330" fill="#58A6FF"/>

  <rect x="700" y="200" width="180" height="80" rx="14" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="790" y="232" text-anchor="middle" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">Consumer 1</text>
  <text x="790" y="258" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="13">pop() → process</text>

  <rect x="700" y="300" width="180" height="80" rx="14" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="790" y="332" text-anchor="middle" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">Consumer 2</text>
  <text x="790" y="358" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="13">pop() → process</text>

  <text x="480" y="402" text-anchor="middle" fill="#F85149" font-family="JetBrains Mono, monospace" font-size="14">wait on not_full ▲ when buffer == cap</text>
  <text x="480" y="426" text-anchor="middle" fill="#F85149" font-family="JetBrains Mono, monospace" font-size="14">wait on not_empty ▼ when buffer == 0</text>
  <text x="480" y="468" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="16">In practice, just use a thread-safe queue — it encapsulates this whole pattern</text>
</svg>
