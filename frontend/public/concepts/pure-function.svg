<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">Pure Function</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">Same input always produces the same output, with no side effects</text>

  <!-- Pure function box -->
  <rect x="72" y="168" width="380" height="260" rx="18" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="100" y="204" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">&#x2713; Pure</text>

  <text x="100" y="244" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="16">add(2, 3)</text>

  <!-- Arrow into pure function -->
  <path d="M100 268 L190 268" stroke="#58A6FF" stroke-width="3" stroke-linecap="round"/>
  <rect x="190" y="254" width="140" height="32" rx="10" fill="#161B22" stroke="#39D353" stroke-width="2"/>
  <text x="260" y="276" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="16">return a+b</text>
  <path d="M330 268 L400 268" stroke="#39D353" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <text x="100" y="310" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="16">&#x2192; always 5</text>
  <text x="100" y="342" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="14">No external reads</text>
  <text x="100" y="366" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="14">No external writes</text>
  <text x="100" y="398" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="15" font-weight="700">Deterministic &#x2713;</text>

  <!-- Impure function box -->
  <rect x="508" y="168" width="380" height="260" rx="18" fill="#0D1117" stroke="#D29922" stroke-width="3"/>
  <text x="536" y="204" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">&#x2717; Impure</text>

  <text x="536" y="244" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="16">addAndCount(2, 3)</text>

  <!-- Arrow into impure function -->
  <path d="M536 268 L626 268" stroke="#58A6FF" stroke-width="3" stroke-linecap="round"/>
  <rect x="626" y="254" width="140" height="32" rx="10" fill="#161B22" stroke="#D29922" stroke-width="2"/>
  <text x="696" y="276" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="16">return a+b</text>
  <path d="M766 268 L836 268" stroke="#D29922" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowAmber)"/>

  <!-- Side effect arrows going out -->
  <path d="M696 286 L696 330" stroke="#D29922" stroke-width="2" stroke-dasharray="6,4" stroke-linecap="round"/>
  <rect x="630" y="330" width="132" height="28" rx="8" fill="#161B22" stroke="#D29922" stroke-width="2"/>
  <text x="696" y="350" text-anchor="middle" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="13">counter++</text>

  <text x="536" y="398" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="15" font-weight="700">Side effects &#x2717;</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8" fill="none" stroke="#39D353" stroke-width="2"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8" fill="none" stroke="#D29922" stroke-width="2"/>
    </marker>
  </defs>

  <text x="480" y="468" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="20">Pure functions are predictable, testable, and safe to parallelize</text>
</svg>
