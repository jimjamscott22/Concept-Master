<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">UDP</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">A connectionless protocol that sends datagrams quickly without guaranteed delivery or order</text>

  <rect x="116" y="196" width="210" height="156" rx="18" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="144" y="232" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">sender</text>
  <text x="144" y="278" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">packet A</text>
  <text x="144" y="312" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">packet B</text>

  <rect x="634" y="196" width="210" height="156" rx="18" fill="#0D1117" stroke="#D29922" stroke-width="3"/>
  <text x="662" y="232" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">receiver</text>
  <text x="662" y="278" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">maybe A</text>
  <text x="662" y="312" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">maybe B</text>

  <path d="M326 268H634" stroke="#58A6FF" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>
  <path d="M326 304H634" stroke="#58A6FF" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>
  <text x="480" y="392" text-anchor="middle" fill="#D29922" font-family="IBM Plex Sans, sans-serif" font-size="20">no handshake, no built-in retransmission</text>
  <text x="480" y="448" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="20">UDP favors low latency over reliability, which is useful for streaming, games, and DNS</text>
</svg>
