<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">Thread Pool</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="16">A fixed set of workers pulls from a shared queue — amortizes thread cost, caps concurrency</text>

  <text x="100" y="200" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">submit()</text>
  <rect x="80" y="220" width="80" height="44" rx="10" fill="#0D1117" stroke="#D29922" stroke-width="2"/>
  <text x="120" y="248" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">task 7</text>
  <rect x="80" y="280" width="80" height="44" rx="10" fill="#0D1117" stroke="#D29922" stroke-width="2"/>
  <text x="120" y="308" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">task 8</text>
  <rect x="80" y="340" width="80" height="44" rx="10" fill="#0D1117" stroke="#D29922" stroke-width="2"/>
  <text x="120" y="368" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">task 9</text>

  <path d="M170 304 L 220 304" stroke="#D29922" stroke-width="3"/>
  <polygon points="214,298 214,310 226,304" fill="#D29922"/>

