  <text x="340" y="234" text-anchor="middle" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">task queue</text>
  <rect x="252" y="256" width="176" height="34" rx="8" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="340" y="278" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">task 6</text>
  <rect x="252" y="298" width="176" height="34" rx="8" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="340" y="320" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">task 5</text>
  <rect x="252" y="340" width="176" height="34" rx="8" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="340" y="362" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">task 4</text>
  <rect x="252" y="382" width="176" height="34" rx="8" fill="#161B22" stroke="#39D353" stroke-width="2"/>
  <text x="340" y="404" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="14">task 3 (next)</text>

  <path d="M450 308 L 500 308" stroke="#39D353" stroke-width="3"/>
  <polygon points="494,302 494,314 506,308" fill="#39D353"/>

  <rect x="510" y="200" width="370" height="220" rx="16" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="695" y="234" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">worker pool (size 4)</text>

  <rect x="528" y="252" width="166" height="64" rx="12" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="611" y="278" text-anchor="middle" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700">Worker 1</text>
  <text x="611" y="300" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="13">running task 0</text>

  <rect x="708" y="252" width="166" height="64" rx="12" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="791" y="278" text-anchor="middle" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700">Worker 2</text>
  <text x="791" y="300" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="13">running task 1</text>

  <rect x="528" y="332" width="166" height="64" rx="12" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="611" y="358" text-anchor="middle" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700">Worker 3</text>
