<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">Hash Map</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">A hash function maps keys to buckets for fast average-case lookup</text>

  <rect x="92" y="186" width="228" height="170" rx="18" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="120" y="222" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">keys</text>
  <rect x="122" y="250" width="168" height="34" rx="8" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <rect x="122" y="296" width="168" height="34" rx="8" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="206" y="273" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">"apple"</text>
  <text x="206" y="319" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">"banana"</text>

  <rect x="376" y="186" width="184" height="170" rx="18" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="404" y="222" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">hash(key)</text>
  <text x="468" y="278" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="26">hash</text>
  <text x="468" y="314" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">compute bucket index</text>

  <rect x="616" y="168" width="248" height="206" rx="18" fill="#0D1117" stroke="#D29922" stroke-width="3"/>
  <text x="644" y="204" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">buckets</text>
  <rect x="648" y="228" width="184" height="30" rx="8" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <rect x="648" y="266" width="184" height="30" rx="8" fill="#161B22" stroke="#39D353" stroke-width="2"/>
  <rect x="648" y="304" width="184" height="30" rx="8" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="740" y="248" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="17">bucket 0</text>
  <text x="740" y="286" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="17">bucket 1: ("apple", 5)</text>
  <text x="740" y="324" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="17">bucket 2</text>

  <path d="M320 272H376" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M560 272H616" stroke="#39D353" stroke-width="4" stroke-linecap="round"/>
  <text x="480" y="436" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="20">Hash maps trade extra structure for very fast average-case insert, lookup, and delete</text>
