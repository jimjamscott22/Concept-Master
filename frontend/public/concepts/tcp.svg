<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">TCP</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">A reliable connection-oriented protocol that delivers bytes in order</text>

  <rect x="122" y="188" width="204" height="168" rx="18" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="150" y="224" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">client</text>
  <text x="150" y="274" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">SYN</text>
  <text x="150" y="308" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">ACK data ...</text>

  <rect x="634" y="188" width="204" height="168" rx="18" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="662" y="224" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">server</text>
  <text x="662" y="274" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">SYN-ACK</text>
  <text x="662" y="308" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">ACK</text>

  <path d="M326 258H634" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M634 292H326" stroke="#39D353" stroke-width="4" stroke-linecap="round"/>
  <path d="M326 326H634" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
  <text x="480" y="392" text-anchor="middle" fill="#D29922" font-family="IBM Plex Sans, sans-serif" font-size="20">three-way handshake before data transfer</text>
  <text x="480" y="448" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="20">TCP prioritizes reliable, ordered delivery with acknowledgments and retransmission</text>
</svg>
