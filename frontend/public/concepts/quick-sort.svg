<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">Quick Sort</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">Choose a pivot, partition values around it, then sort the partitions recursively</text>

  <g font-family="JetBrains Mono, monospace" font-size="22" text-anchor="middle">
    <rect x="182" y="176" width="596" height="54" rx="12" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
    <text x="480" y="210" fill="#E6EDF3">[8, 3, 5, 1, 7]</text>
    <rect x="438" y="170" width="84" height="66" rx="14" fill="#0D1117" stroke="#39D353" stroke-width="4"/>
    <text x="480" y="210" fill="#39D353">5</text>

    <rect x="118" y="300" width="216" height="54" rx="12" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
    <rect x="372" y="300" width="216" height="54" rx="12" fill="#0D1117" stroke="#D29922" stroke-width="3"/>
    <rect x="626" y="300" width="216" height="54" rx="12" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
    <text x="226" y="334" fill="#E6EDF3">[3, 1]</text>
    <text x="480" y="334" fill="#E6EDF3">[5]</text>
    <text x="734" y="334" fill="#E6EDF3">[8, 7]</text>
  </g>

  <path d="M480 236L226 300" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M480 236V300" stroke="#39D353" stroke-width="4" stroke-linecap="round"/>
  <path d="M480 236L734 300" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
  <text x="226" y="280" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="18">&lt; pivot</text>
  <text x="480" y="280" text-anchor="middle" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="18">pivot</text>
  <text x="734" y="280" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="18">&gt; pivot</text>
  <text x="480" y="446" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="20">Quick sort is fast on average because each pivot splits the problem into smaller partitions</text>
</svg>
