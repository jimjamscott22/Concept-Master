<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">ACID Properties</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">Four guarantees that every reliable database transaction must provide</text>

  <!-- Central Transaction element -->
  <rect x="370" y="210" width="220" height="100" rx="18" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="480" y="253" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">Transaction</text>
  <text x="480" y="283" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="16">unit of work</text>

  <!-- Atomicity (top-left) -->
  <rect x="72" y="168" width="250" height="90" rx="18" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="100" y="206" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">A</text>
  <text x="124" y="206" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">tomicity</text>
  <text x="100" y="237" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="14">all-or-nothing</text>

  <!-- Consistency (top-right) -->
  <rect x="638" y="168" width="250" height="90" rx="18" fill="#0D1117" stroke="#D29922" stroke-width="3"/>
  <text x="666" y="206" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">C</text>
  <text x="690" y="206" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">onsistency</text>
  <text x="666" y="237" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="14">valid state → valid state</text>

  <!-- Isolation (bottom-left) -->
  <rect x="72" y="296" width="250" height="90" rx="18" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="100" y="334" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">I</text>
  <text x="114" y="334" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">solation</text>
  <text x="100" y="365" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="14">no interference</text>

  <!-- Durability (bottom-right) -->
  <rect x="638" y="296" width="250" height="90" rx="18" fill="#0D1117" stroke="#D29922" stroke-width="3"/>
  <text x="666" y="334" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">D</text>
  <text x="690" y="334" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">urability</text>
  <text x="666" y="365" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="14">survives crashes</text>

  <!-- Connection lines from properties to center -->
  <path d="M322 213H370" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M638 213H590" stroke="#D29922" stroke-width="4" stroke-linecap="round"/>
  <path d="M322 341H350" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M350 341L370 310" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M638 341H610" stroke="#D29922" stroke-width="4" stroke-linecap="round"/>
  <path d="M610 341L590 310" stroke="#D29922" stroke-width="4" stroke-linecap="round"/>

  <text x="480" y="460" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="20">Together these properties ensure transactions are safe and predictable</text>
</svg>
