<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">Content Security Policy</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">A browser rule set that limits which sources a page can load or execute</text>
  <rect x="112" y="198" width="224" height="156" rx="18" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="224" y="252" text-anchor="middle" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700">Page</text>
  <text x="224" y="296" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">script request</text>
  <rect x="392" y="172" width="176" height="208" rx="18" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="480" y="224" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700">CSP</text>
  <text x="480" y="268" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">'self'</text>
  <text x="480" y="302" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">allowed list</text>
  <rect x="624" y="188" width="224" height="80" rx="16" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="736" y="238" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">trusted script</text>
  <rect x="624" y="306" width="224" height="80" rx="16" fill="#0D1117" stroke="#F85149" stroke-width="3"/>
  <text x="736" y="356" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">blocked script</text>
  <path d="M336 276H392M568 228H624M568 346H624" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
  <text x="480" y="444" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="20">Unexpected sources are denied even if injected markup reaches the page</text>
</svg>
