<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">WebSocket</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">A persistent connection that allows client and server to send messages both ways at any time</text>

  <rect x="116" y="188" width="210" height="168" rx="18" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="144" y="224" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">client</text>
  <text x="144" y="274" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">send: ping</text>
  <text x="144" y="308" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">receive: update</text>

  <rect x="634" y="188" width="210" height="168" rx="18" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="662" y="224" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">server</text>
  <text x="662" y="274" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">push: update</text>
  <text x="662" y="308" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">receive: ping</text>

  <path d="M326 264H634" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M634 308H326" stroke="#39D353" stroke-width="4" stroke-linecap="round"/>
  <text x="480" y="392" text-anchor="middle" fill="#D29922" font-family="IBM Plex Sans, sans-serif" font-size="20">single long-lived connection, bidirectional messages</text>
  <text x="480" y="448" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="20">WebSockets are useful for chat, dashboards, multiplayer updates, and real-time notifications</text>
</svg>
