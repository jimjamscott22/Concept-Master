<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Tool Use (Function Calling) concept diagram</title>
  <desc id="desc">The model requests a tool call with structured arguments, the application executes it, and the result is returned to the model.</desc>
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="94" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700">Tool Use (Function Calling)</text>
  <text x="72" y="126" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">The model requests; the application decides and executes</text>

  <rect x="88" y="220" width="220" height="110" rx="16" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="198" y="266" text-anchor="middle" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">Model</text>
  <text x="198" y="292" text-anchor="middle" fill="#E6EDF3" font-family="IBM Plex Sans, sans-serif" font-size="14">requests a call</text>

  <rect x="370" y="220" width="220" height="110" rx="16" fill="#0D1117" stroke="#D29922" stroke-width="3"/>
  <text x="480" y="260" text-anchor="middle" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700">Application</text>
  <text x="480" y="284" text-anchor="middle" fill="#E6EDF3" font-family="IBM Plex Sans, sans-serif" font-size="14">permission check,</text>
  <text x="480" y="304" text-anchor="middle" fill="#E6EDF3" font-family="IBM Plex Sans, sans-serif" font-size="14">then executes</text>

  <rect x="652" y="220" width="220" height="110" rx="16" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="762" y="266" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">Tool</text>
  <text x="762" y="292" text-anchor="middle" fill="#E6EDF3" font-family="IBM Plex Sans, sans-serif" font-size="14">e.g. read_file()</text>

  <path d="M308 258H370" stroke="#8B949E" stroke-width="3" stroke-linecap="round"/>
  <path d="M358 250l14 8-14 8" stroke="#8B949E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="339" y="244" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="12">call + args</text>

  <path d="M590 262H652" stroke="#8B949E" stroke-width="3" stroke-linecap="round"/>
  <path d="M640 254l14 8-14 8" stroke="#8B949E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M762 330C762 372 480 372 198 372C198 372 198 356 198 330" stroke="#8B949E" stroke-width="3" fill="none"/>
  <path d="M190 342l8 -16 12 14" stroke="#8B949E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="480" y="398" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="13">result appended back into context</text>

  <text x="480" y="460" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">The model never touches the system directly — it only ever requests a call</text>
</svg>
