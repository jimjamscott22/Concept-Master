<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">Abstract Data Type</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">What operations are allowed — not how they're implemented</text>

  <g transform="translate(320 168)">
    <rect x="0" y="0" width="320" height="132" rx="12" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
    <text x="160" y="36" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">interface List&lt;E&gt;</text>
    <text x="24" y="68" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="16">add(E e)</text>
    <text x="24" y="92" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="16">get(int i)</text>
    <text x="24" y="116" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="16">remove(int i)</text>
    <text x="180" y="68" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="16">size()</text>
    <text x="180" y="92" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="16">contains(E)</text>
    <text x="180" y="116" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="16">iterator()</text>
  </g>

  <line x1="96" y1="332" x2="864" y2="332" stroke="#58A6FF" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="480" y="326" text-anchor="middle" fill="#58A6FF" font-family="IBM Plex Sans, sans-serif" font-size="14" font-style="italic">abstraction barrier — implementations live below</text>

  <path d="M400 300 L240 360" stroke="#30363D" stroke-width="2"/>
  <path d="M560 300 L720 360" stroke="#30363D" stroke-width="2"/>

  <g transform="translate(128 360)">
    <rect x="0" y="0" width="224" height="100" rx="12" fill="#0D1117" stroke="#58A6FF" stroke-width="2"/>
    <text x="112" y="32" text-anchor="middle" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">ArrayList</text>
    <text x="112" y="58" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="13">backed by a resizable</text>
    <text x="112" y="76" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="13">contiguous array</text>
  </g>

  <g transform="translate(608 360)">
    <rect x="0" y="0" width="224" height="100" rx="12" fill="#0D1117" stroke="#58A6FF" stroke-width="2"/>
    <text x="112" y="32" text-anchor="middle" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">LinkedList</text>
    <text x="112" y="58" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="13">backed by doubly-linked</text>
    <text x="112" y="76" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="13">node pointers</text>
  </g>

  <text x="480" y="494" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">Same contract, different machinery — swap implementations without touching callers</text>
</svg>
