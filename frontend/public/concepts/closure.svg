<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">Closure</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">An inner function keeps access to variables from its outer scope</text>

  <rect x="90" y="184" width="320" height="220" rx="18" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="116" y="220" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">outer function</text>
  <rect x="122" y="250" width="120" height="60" rx="12" fill="#161B22" stroke="#39D353" stroke-width="2"/>
  <text x="182" y="288" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="22">count = 0</text>
  <rect x="122" y="328" width="258" height="54" rx="12" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="146" y="362" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="18">return inner</text>

  <rect x="530" y="214" width="278" height="156" rx="18" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="556" y="248" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">inner function</text>
  <text x="556" y="292" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="20">count = count + 1</text>
  <text x="556" y="326" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="20">return count</text>

  <path d="M410 280C460 250 496 244 530 266" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
  <path d="M530 298C494 298 460 294 430 286C392 276 356 262 242 280" stroke="#39D353" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10"/>
  <text x="456" y="246" fill="#58A6FF" font-family="IBM Plex Sans, sans-serif" font-size="18">returns function</text>
  <text x="446" y="330" fill="#39D353" font-family="IBM Plex Sans, sans-serif" font-size="18">still remembers outer variable</text>

  <text x="480" y="456" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="20">A closure packages code together with the surrounding state it captured</text>
</svg>
