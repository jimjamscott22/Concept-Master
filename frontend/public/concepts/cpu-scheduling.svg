<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">CPU Scheduling</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="16">The scheduler picks the next ready task to run on the CPU; a timer interrupt brings control back</text>

  <text x="100" y="200" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700">Ready Queue</text>

  <rect x="100" y="220" width="110" height="64" rx="12" fill="#0D1117" stroke="#58A6FF" stroke-width="2"/>
  <text x="155" y="248" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">P1</text>
  <text x="155" y="270" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="13">prio 5</text>

  <rect x="220" y="220" width="110" height="64" rx="12" fill="#0D1117" stroke="#58A6FF" stroke-width="2"/>
  <text x="275" y="248" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">P2</text>
  <text x="275" y="270" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="13">prio 3</text>

  <rect x="340" y="220" width="110" height="64" rx="12" fill="#0D1117" stroke="#58A6FF" stroke-width="2"/>
  <text x="395" y="248" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">P3</text>
  <text x="395" y="270" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="13">prio 7</text>

  <rect x="460" y="220" width="110" height="64" rx="12" fill="#0D1117" stroke="#58A6FF" stroke-width="2"/>
  <text x="515" y="248" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">P4</text>
  <text x="515" y="270" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="13">prio 2</text>

  <path d="M580 252H660" stroke="#D29922" stroke-width="4" stroke-linecap="round"/>
  <polygon points="660,246 660,258 672,252" fill="#D29922"/>
  <text x="620" y="240" text-anchor="middle" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="14">scheduler</text>

  <rect x="680" y="200" width="190" height="104" rx="16" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="775" y="238" text-anchor="middle" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">CPU</text>
  <text x="775" y="270" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="18">running P3</text>
  <text x="775" y="292" text-anchor="middle" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="13">quantum: 2ms</text>

  <path d="M775 304 Q 775 380 480 380 Q 200 380 200 304" stroke="#F85149" stroke-width="3" stroke-dasharray="6 6" fill="none"/>
  <polygon points="194,304 206,304 200,290" fill="#F85149"/>
  <text x="480" y="412" text-anchor="middle" fill="#F85149" font-family="JetBrains Mono, monospace" font-size="16">timer interrupt → preempt → back to queue</text>

  <text x="480" y="468" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">Policy (round-robin, priority, CFS) decides who runs next and for how long</text>
</svg>
