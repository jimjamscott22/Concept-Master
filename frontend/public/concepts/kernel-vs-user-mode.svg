<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">Kernel vs User Mode</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="16">Hardware-enforced privilege split; user code must trap into the kernel to do anything privileged</text>

  <rect x="80" y="180" width="800" height="120" rx="16" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
  <text x="110" y="216" fill="#58A6FF" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">user mode</text>
  <text x="110" y="244" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="14">ring 3 · restricted instructions · no direct hardware access</text>

  <rect x="120" y="256" width="160" height="34" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="200" y="278" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">app: browser</text>

  <rect x="296" y="256" width="160" height="34" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="376" y="278" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">app: editor</text>

  <rect x="472" y="256" width="160" height="34" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="552" y="278" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">app: shell</text>

  <rect x="648" y="256" width="200" height="34" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="748" y="278" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">app: your program</text>

  <rect x="380" y="318" width="200" height="44" rx="10" fill="#0D1117" stroke="#D29922" stroke-width="3"/>
  <text x="480" y="346" text-anchor="middle" fill="#D29922" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">syscall / trap</text>

  <path d="M480 290 L 480 318" stroke="#D29922" stroke-width="3"/>
  <polygon points="474,316 486,316 480,328" fill="#D29922"/>
  <path d="M480 362 L 480 390" stroke="#D29922" stroke-width="3"/>
  <polygon points="474,388 486,388 480,400" fill="#D29922"/>

  <rect x="80" y="390" width="800" height="100" rx="16" fill="#0D1117" stroke="#39D353" stroke-width="3"/>
  <text x="110" y="426" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">kernel mode</text>
  <text x="110" y="454" fill="#8B949E" font-family="JetBrains Mono, monospace" font-size="14">ring 0 · full privilege · drives hardware · enforces isolation</text>
  <text x="110" y="478" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="14">scheduler   ·   memory mgr   ·   file system   ·   device drivers</text>
</svg>
