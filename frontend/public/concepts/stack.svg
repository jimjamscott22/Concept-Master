<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0D1117"/>
  <rect x="32" y="32" width="896" height="476" rx="20" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <text x="72" y="98" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700">Stack</text>
  <text x="72" y="132" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="18">A stack stores items in last-in, first-out order</text>

  <g transform="translate(352 180)">
    <rect x="0" y="180" width="256" height="64" rx="12" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
    <rect x="0" y="112" width="256" height="64" rx="12" fill="#0D1117" stroke="#58A6FF" stroke-width="3"/>
    <rect x="0" y="44" width="256" height="64" rx="12" fill="#0D1117" stroke="#39D353" stroke-width="4"/>
    <text x="128" y="220" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="24">A</text>
    <text x="128" y="152" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="24">B</text>
    <text x="128" y="84" text-anchor="middle" fill="#E6EDF3" font-family="JetBrains Mono, monospace" font-size="24">C</text>
  </g>

  <text x="642" y="246" fill="#39D353" font-family="JetBrains Mono, monospace" font-size="20">top</text>
  <path d="M628 250L608 252" stroke="#39D353" stroke-width="4" stroke-linecap="round"/>
  <text x="188" y="284" fill="#58A6FF" font-family="IBM Plex Sans, sans-serif" font-size="20">push adds to top</text>
  <text x="188" y="318" fill="#58A6FF" font-family="IBM Plex Sans, sans-serif" font-size="20">pop removes from top</text>
  <text x="480" y="448" text-anchor="middle" fill="#8B949E" font-family="IBM Plex Sans, sans-serif" font-size="20">Stacks are ideal for undo history, function calls, and depth-first style processing</text>
</svg>
